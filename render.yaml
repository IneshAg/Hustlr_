# Render Blueprint — deploy ML + Node API from this monorepo.
# Dashboard: New → Blueprint → connect this Git repo → Render reads render.yaml
#
# PYTHON VERSION: Pinned to 3.12 — xgboost does NOT yet ship wheels for Python 3.14,
# so pip silently skips it on the default runtime, causing ModuleNotFoundError at startup.
# After deploy:
#   1) Set SUPABASE_URL + SUPABASE_SERVICE_KEY on hustlr-api (and any other keys from hustlr-backend/.env.example).
#   2) Flutter release: flutter build apk --dart-define=HUSTLR_API_PROD=https://<hustlr-api>.onrender.com
#
# ML loads models from repo paths: outputs/trained_models and hustlr_ml/outputs/trained_models
# (commit full model artifacts or health will show "degraded" — rule fallbacks still run).

services:
  - type: web
    name: hustlr-ml
    runtime: python
    plan: free
    region: oregon
    rootDir: hustlr-ml
    buildCommand: pip install --upgrade pip && pip install --no-cache-dir -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: web
    name: hustlr-api
    runtime: node
    plan: free
    region: oregon
    rootDir: hustlr-backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: ML_SERVICE_URL
        fromService:
          name: hustlr-ml
          type: web
          envVarKey: RENDER_EXTERNAL_URL
      - key: NODE_VERSION
        value: "20"
      # Required for API + DB — set values in Render Dashboard when prompted
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
